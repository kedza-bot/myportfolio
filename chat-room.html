            <p class="verified-text">Verified</p>
        </div>
        <p class="profile-tag">@mrafrica</p>
        <!-------------------------************** Navigation Menu****************************------------------------->
        <div class="themes">
            <i id="toggle-light" class="fa-solid fa-cloud-moon"></i>
            <i id="toggle-dark" class="fa-regular fa-sun"></i>
        </div>
        <nav>
            <ul class="nav-menu">
                <li><i class="fa-solid fa-house nav-icons"></i><a href="index.html">Home</a></li>
                <li><i class="fa-regular fa-circle-user nav-icons"></i><a href="about-me.html">About</a></li>
                <li><i class="fa-regular fa-trophy nav-icons"></i><a href="achievements.html">Achievements</a></li>
                <li><i class="fa-solid fa-list-check nav-icons"></i><a href="projects.html">Projects</a></li>
                <li><i class="fa-regular fa-address-book nav-icons"></i><a href="#contact">Contact</a></li>
                <li><i class="fa-solid fa-blog nav-icons"></i><a href="blog.html">Blog</a></li>
                <li><i class="fa-regular fa-comment-dots nav-icons"></i><a href="chat-room.html">Chatroom</a></li>

            <!---------------******mobile drop down**********************************------------------->
            <ul class="mobile-container">

            </footer>

        </nav>
    </header>
    <style>
        .auth-buttons {
            text-align: center;
            margin: 20px;
        }

        .auth-buttons button {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            background: #4285F4;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .auth-buttons button:nth-child(2) {
            background: #333;
        }

        .chat-container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            position: relative;
        }

        .message.sent {
            background: #DCF8C6;
            margin-left: auto;
        }

        .message.received {
            background: #E5E5EA;
            margin-right: auto;
        }

        .message small {
            display: block;
            font-size: 0.7rem;
            color: gray;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ccc;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
        }

        .chat-input button {
            padding: 15px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>


    <!-- Login Buttons -->
    <div class="auth-buttons">
        <button onclick="loginWithGoogle()">Sign in with Google</button>
        <button onclick="loginWithGithub()">Sign in with Github</button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
        <div id="chat-box" class="chat-box">
            <!-- Messages will load here -->
        </div>

        <!-- Message input -->
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
